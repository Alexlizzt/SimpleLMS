lms_progress.complete:
  path: '/lesson/{lesson}/complete'
  defaults:
    _controller: '\Drupal\lms_progress\Controller\ProgressController::complete'
    _title: 'Complete lesson'
  requirements:
    _permission: 'access content'
lms_progress.enroll:
  path: '/course/{course}/enroll'
  defaults:
    _controller: '\Drupal\lms_progress\Controller\ProgressController::enroll'
  requirements:
    _permission: 'access content'
