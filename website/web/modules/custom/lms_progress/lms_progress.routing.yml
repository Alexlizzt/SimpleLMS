lms_progress.complete:
  path: '/lesson/{lesson}/complete'
  defaults:
    _controller: '\Drupal\lms_progress\Controller\ProgressController::complete'
    _title: 'Complete lesson'
  requirements:
    _permission: 'access content'
lms_progress.enroll:
  path: '/course/{course}/enroll'
  defaults:
    _controller: '\Drupal\lms_progress\Controller\ProgressController::enroll'
  requirements:
    _permission: 'access content'
lms_progress.continue_course:
  path: '/course/{course}/continue'
  defaults:
    _controller: '\Drupal\lms_progress\Controller\ProgressController::continueCourse'
  requirements:
    _permission: 'access content'
lms_progress.certificate:
  path: '/course/{course}/certificate'
  defaults:
    _controller: '\Drupal\lms_progress\Controller\ProgressController::certificate'
  requirements:
    _permission: 'access content'
lms_progress.verify_certificate:
  path: '/certificate/verify/{certificate_id}'
  defaults:
    _controller: '\Drupal\lms_progress\Controller\ProgressController::verify'
  requirements:
    _permission: 'access content'
